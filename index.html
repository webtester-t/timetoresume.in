<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeToResume India</title>
  <!-- Inter font — clean, geometric, brandless -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  <style>
    /* reset – everything subtle, no distractions */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0f15;  /* deep silent backdrop */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;              /* no scroll, pure focus */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eceef2;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- soft living blobs (open-source spirit, pure css) ---------- */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);           /* dreamy, distant light */
      opacity: 0.3;                  /* whisper, not shout */
      will-change: transform;
      pointer-events: none;           /* never block text */
      z-index: 0;
    }

    .blob-1 {
      width: 70vmax;
      height: 70vmax;
      background: #5f6caf;            /* muted lavender-blue */
      top: -20vh;
      left: -10vw;
      animation: drift1 28s infinite alternate ease-in-out;
    }

    .blob-2 {
      width: 60vmin;
      height: 60vmin;
      background: #cf6f8b;            /* dusty rose */
      bottom: -5vh;
      right: -5vw;
      animation: drift2 22s infinite alternate ease-in-out;
    }

    .blob-3 {
      width: 80vmin;
      height: 80vmin;
      background: #b7a46c;            /* warm ochre */
      top: 30vh;
      right: 20vw;
      opacity: 0.25;
      animation: drift3 32s infinite alternate ease-in-out;
    }

    /* slow, wandering movements — like clouds forming */
    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(12%, 8%) scale(1.2); }
    }
    @keyframes drift2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-15%, -12%) scale(1.3); }
    }
    @keyframes drift3 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8%, -18%) scale(1.15); }
    }

    /* ---------- main content — only words, no logo, no input ---------- */
    .message {
      position: relative;
      z-index: 10;
      max-width: 900px;
      padding: 2rem;
      text-align: center;
      animation: appear 1.8s ease-out;   /* gentle fade on load */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    h1 {
      font-weight: 600;
      font-size: clamp(2.5rem, 12vw, 5.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #dedede 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;                /* subtle gradient in text */
      text-shadow: 0 0 30px rgba(190, 190, 255, 0.15);
      margin-bottom: 0.2rem;
    }

    .sub {
      font-weight: 300;
      font-size: clamp(1.2rem, 5vw, 2.2rem);
      letter-spacing: 0.2rem;
      text-transform: uppercase;
      color: #b2b9cc;
      background: linear-gradient(135deg, #d0d6e6, #a3aec9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.9;
      margin-top: 0.2rem;
      border-bottom: 1px solid rgba(160, 180, 220, 0.2);
      padding-bottom: 0.75rem;
    }

    /* tiny breathing dot — pure geometry, zero brand */
    .breathing-dot {
      margin-top: 2.2rem;
      width: 2px;
      height: 2px;
      background: rgba(210, 220, 250, 0.4);
      border-radius: 50%;
      box-shadow: 0 0 20px 6px rgba(160, 180, 240, 0.3);
      animation: breathe 4.4s infinite ease-in-out;
    }

    /* optional minimal rhythm — like a slow pulse */
    @keyframes breathe {
      0% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); box-shadow: 0 0 30px 12px rgba(180, 200, 255, 0.4); }
      100% { opacity: 0.2; transform: scale(1); }
    }

    @keyframes appear {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ensure text stays readable on all screens */
    @media (max-width: 600px) {
      .sub {
        letter-spacing: 0.1rem;
      }
      .breathing-dot {
        margin-top: 1.5rem;
      }
      /* blobs become slightly smaller on narrow screens */
      .blob-1 { width: 90vmax; height: 90vmax; }
      .blob-2 { width: 70vmin; height: 70vmin; }
    }

    /* no footer, no copyright, no logo — just the promise */
  </style>
</head>
<body>
  <!-- background shapes: open-source in spirit, just css & motion -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- main text — exactly what you asked: two phrases, nothing else -->
  <div class="message">
    <h1>We are launching soon</h1>
    <div class="sub">something great is coming</div>
    <!-- not a button, not a form — just a quiet, living pixel -->
    <div class="breathing-dot" aria-hidden="true"></div>
    <!-- the dot is pure abstract animation, no logo, no brand -->
  </div>

  <!-- absolutely no forms, no subscribe, no email, no trademarks -->
</body>
</html>
